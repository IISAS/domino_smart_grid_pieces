name: Run tests on dev branch

on:
  push:
    branches:
      - dev3
    paths:
      - "config.toml"
      - "pieces/**"
      - "dependencies/**"
      - "requirements-tests.txt"
      - "run_all_tests.sh"
      - ".ci/skip-pieces.txt"
      - ".github/workflows/tests-dev.yml"
  workflow_dispatch:

jobs:
  run-tests-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal access token.
          fetch-depth: 0 # otherwise, there would be errors pushing refs to the destination repository.

      - name: Compute image tag prefix
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "dev3" ]]; then
            TAG_PREFIX="dev-3"
          else
            TAG_PREFIX="development"
          fi
          echo "TAG_PREFIX=$TAG_PREFIX" >> "$GITHUB_ENV"
          echo "Using image tag prefix: $TAG_PREFIX"

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Prepare filtered workspace (non-destructive)
        shell: bash
        run: |
          set -euo pipefail
          CI_WORKDIR="$RUNNER_TEMP/filtered_repo"
          rm -rf "$CI_WORKDIR"
          mkdir -p "$CI_WORKDIR"
          rsync -a --exclude ".git" ./ "$CI_WORKDIR"/

          echo "CI_WORKDIR=$CI_WORKDIR" >> "$GITHUB_ENV"

          SKIP_FILE=".ci/skip-pieces.txt"
          if [[ ! -f "$CI_WORKDIR/$SKIP_FILE" ]]; then
            echo "No skip config found. Using full workspace."
            exit 0
          fi

          while IFS= read -r piece; do
            piece="$(echo "$piece" | sed 's/#.*//' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [[ -z "$piece" ]] && continue
            if [[ -d "$CI_WORKDIR/pieces/$piece" ]]; then
              echo "Skipping piece in build/test: $piece"
              rm -rf "$CI_WORKDIR/pieces/$piece"
            fi
          done < "$CI_WORKDIR/$SKIP_FILE"

      - name: Pip install packages
        run: |
          python -m pip install -U pip
          pip install --no-cache-dir domino-py[cli]

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pip list
        run: pip list | grep domino

      - name: Run organize and build images
        working-directory: ${{ env.CI_WORKDIR }}
        run: |
          domino piece organize --build-images --source-url=https://github.com/${{github.repository}} --tag-overwrite=${TAG_PREFIX}

      - name: Install Tests Dependencies
        working-directory: ${{ env.CI_WORKDIR }}
        run: pip install -r requirements-tests.txt

      # Remember to pass any necessary secrets as env vars here
      - name: Run tests over built images
        working-directory: ${{ env.CI_WORKDIR }}
        env:
          DOMINO_TESTS_ENVIRONMENT: github
          PIECE_SECRET_1: ${{ secrets.PIECE_SECRET_1 }}
          SKIP_OKTE_INTEGRATION: "1"
        run: |
          pytest --cov=pieces --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish images
        working-directory: ${{ env.CI_WORKDIR }}
        env:
          GHCR_USERNAME: ${{ github.actor }}
          # Helps with large image pushes and slow runner networking.
          DOCKER_CLIENT_TIMEOUT: "300"
          COMPOSE_HTTP_TIMEOUT: "300"
        run: |
          echo "Publishing images (up to 3 attempts)..."
          for i in 1 2 3; do
            domino piece publish-images --registry-token ${{ secrets.GITHUB_TOKEN }} && exit 0
            echo "Attempt $i failed."
            sleep 20
          done
          echo "Publish failed after retries."
          exit 1

      - name: Sync generated domino metadata back
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "${CI_WORKDIR}/.domino" ]]; then
            rm -rf .domino
            cp -R "${CI_WORKDIR}/.domino" .domino
          fi

      - name: Commit files
        id: commit_files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          GIT_STATUS=$(git status -s)
          if [[ ! -z "$GIT_STATUS" ]]; then
            git add .domino/* && git commit -m "auto-organize" -a
            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_ENV
          else
            echo "No changes to commit"
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Create Release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Immutable, incrementing dev release (keeps history)
          DEV_TAG="${TAG_PREFIX}-${{ github.run_number }}"
          domino piece release --tag-name="$DEV_TAG" --commit-sha="$commit_sha"

          # Moving "latest dev" tag for consumers that always pull `${TAG_PREFIX}`
          domino piece delete-release --tag-name=${TAG_PREFIX} || true
          domino piece release --tag-name=${TAG_PREFIX} --commit-sha="$commit_sha"
