name: Run tests on dev branch

on:
  push:
    branches:
      - dev
    paths:
      - "config.toml"
      - "pieces/**"
      - "dependencies/**"
      - "requirements-tests.txt"
      - "run_all_tests.sh"
      - ".ci/skip-pieces.txt"
  workflow_dispatch:

jobs:
  run-tests-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal access token.
          fetch-depth: 0 # otherwise, there would be errors pushing refs to the destination repository.

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Apply skip-pieces config
        shell: bash
        run: |
          set -euo pipefail
          SKIP_FILE=".ci/skip-pieces.txt"
          if [[ ! -f "$SKIP_FILE" ]]; then
            echo "No skip config found."
            exit 0
          fi

          while IFS= read -r piece; do
            piece="$(echo "$piece" | sed 's/#.*//' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [[ -z "$piece" ]] && continue
            if [[ -d "pieces/$piece" ]]; then
              echo "Skipping piece in build/test: $piece"
              rm -rf "pieces/$piece"
            fi
          done < "$SKIP_FILE"

      - name: Pip install packages
        run: |
          python -m pip install -U pip
          pip install --no-cache-dir domino-py[cli]

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pip list
        run: pip list | grep domino

      - name: Run organize and build images
        run: |
          domino piece organize --build-images --source-url=https://github.com/${{github.repository}} --tag-overwrite=development2

      - name: Install Tests Dependencies
        run: pip install -r requirements-tests.txt

      # Remember to pass any necessary secrets as env vars here
      - name: Run tests over built images
        env:
          DOMINO_TESTS_ENVIRONMENT: github
          PIECE_SECRET_1: ${{ secrets.PIECE_SECRET_1 }}
          SKIP_OKTE_INTEGRATION: "1"
        run: |
          pytest --cov=pieces --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish images
        env:
          GHCR_USERNAME: ${{ github.actor }}
        run: domino piece publish-images --registry-token ${{ secrets.GITHUB_TOKEN }}

      - name: Commit files
        id: commit_files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          GIT_STATUS=$(git status -s)
          if [[ ! -z "$GIT_STATUS" ]]; then
            git add .domino/* && git commit -m "auto-organize" -a
            echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_ENV
          else
            echo "No changes to commit"
            echo "commit_sha=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: Create Release
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          domino piece delete-release --tag-name=development2
          domino piece release --tag-name=development2 --commit-sha=$commit_sha
